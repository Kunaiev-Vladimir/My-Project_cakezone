{% extends 'index.html' %}

{% block content %}

<div class="container" style="margin-top: 120px; max-width: 450px;">
    <div class="card shadow-sm border-0 rounded-4 p-4">

        <h4 class="text-center mb-4">Register</h4>

        <form method="post">
            {% csrf_token %}

            {% if form.non_field_errors %}
                <div class="alert alert-danger py-2 text-center small">
                    {{ form.non_field_errors }}
                </div>
            {% endif %}

            {% for field in form %}
                <div class="mb-3">

                    <div class="form-floating">
                        {{ field }}
                        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    </div>

                    {% if field.errors %}
                        <div class="text-danger small mt-1 ps-1">
                            {{ field.errors }}
                        </div>
                    {% endif %}

                </div>
            {% endfor %}

            <button type="submit"
                    class="btn w-100 py-2 rounded-3 text-white fw-semibold"
                    style="background-color: #ff7a00;">
                Register
            </button>

        </form>

    </div>
</div>

{% endblock %}
